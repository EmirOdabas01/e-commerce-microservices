<div class="auth-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Forgot Password</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (!submitted) {
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <p>Enter your email address and we'll send you a reset link.</p>
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="email">
          </mat-form-field>

          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading">
            @if (loading) {
              Sending...
            } @else {
              Send Reset Token
            }
          </button>
        </form>
      } @else {
        <p>If the email exists in our system, a password reset link has been sent. Check your inbox.</p>
        <a mat-raised-button color="primary" routerLink="/auth/reset-password">I have a reset token</a>
      }
      <p class="link"><a routerLink="/auth/login">Back to Login</a></p>
    </mat-card-content>
  </mat-card>
</div>
