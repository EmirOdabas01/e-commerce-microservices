<mat-toolbar color="primary">
  <a mat-button routerLink="/">E-Commerce</a>
  <a mat-button routerLink="/catalog" routerLinkActive="active">Catalog</a>
  @if (isAdmin$ | async) {
    <a mat-button routerLink="/admin" routerLinkActive="active">Admin</a>
  }
  <span class="spacer"></span>
  <a mat-icon-button routerLink="/cart">
    <mat-icon [matBadge]="(cartItemCount$ | async) || 0" matBadgeColor="warn" matBadgeSize="small" [matBadgeHidden]="(cartItemCount$ | async) === 0">shopping_cart</mat-icon>
  </a>
  @if (isAuthenticated$ | async) {
    <button mat-icon-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      @if (user$ | async; as user) {
        <div class="user-info">{{ user.firstName }} {{ user.lastName }}</div>
      }
      <a mat-menu-item routerLink="/profile">Profile</a>
      <button mat-menu-item (click)="logout()">Logout</button>
    </mat-menu>
  } @else {
    <a mat-button routerLink="/auth/login">Login</a>
    <a mat-button routerLink="/auth/register">Register</a>
  }
</mat-toolbar>
