<div class="auth-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Forgot Password</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (!submitted) {
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <p>Enter your email address and we'll generate a reset token.</p>
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="email">
          </mat-form-field>

          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading">
            @if (loading) {
              Sending...
            } @else {
              Send Reset Token
            }
          </button>
        </form>
      } @else {
        <p>A reset token has been generated. Use it on the reset password page.</p>
        @if (resetToken) {
          <p class="token-display"><strong>Token:</strong> {{ resetToken }}</p>
        }
        <a mat-raised-button color="primary" routerLink="/auth/reset-password">Reset Password</a>
      }
      <p class="link"><a routerLink="/auth/login">Back to Login</a></p>
    </mat-card-content>
  </mat-card>
</div>
