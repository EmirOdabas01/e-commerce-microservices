services:
  catalogdb:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: CatalogDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - catalogdb_data:/var/lib/postgresql/data

  orderdb:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: OrderDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - orderdb_data:/var/lib/postgresql/data

  identitydb:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: IdentityDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - identitydb_data:/var/lib/postgresql/data

  basketcache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - basketcache_data:/data

  messagebroker:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - messagebroker_data:/var/lib/rabbitmq

  catalog.api:
    build:
      context: .
      dockerfile: Services/Catalog/Catalog.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "6060:8080"
    depends_on:
      - catalogdb

  identity.api:
    build:
      context: .
      dockerfile: Services/Identity/Identity.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "6063:8080"
    depends_on:
      - identitydb

  basket.api:
    build:
      context: .
      dockerfile: Services/Basket/Basket.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "6061:8080"
    depends_on:
      - basketcache
      - messagebroker
      - catalog.api

  order.api:
    build:
      context: .
      dockerfile: Services/Order/Order.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "6062:8080"
    depends_on:
      - orderdb
      - messagebroker

  payment.api:
    build:
      context: .
      dockerfile: Services/Payment/Payment.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "6065:8080"
    depends_on:
      - messagebroker

  notification.api:
    build:
      context: .
      dockerfile: Services/Notification/Notification.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "6066:8080"
    depends_on:
      - messagebroker

  gateway.yarp:
    build:
      context: .
      dockerfile: ApiGateways/Gateway.Yarp/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "6064:8080"
    depends_on:
      - catalog.api
      - basket.api
      - order.api
      - identity.api
      - payment.api

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - gateway.yarp

volumes:
  catalogdb_data:
  orderdb_data:
  identitydb_data:
  basketcache_data:
  messagebroker_data:
