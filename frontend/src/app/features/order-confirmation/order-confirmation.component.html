<div class="confirmation-container">
  <mat-card>
    <mat-card-content>
      <mat-icon class="success-icon">check_circle</mat-icon>
      <h1>Order Placed Successfully!</h1>
      <p>Thank you for your purchase. Your order has been submitted and is being processed.</p>
      <p>You can track your order status in your profile.</p>
      <div class="actions">
        <a mat-raised-button color="primary" routerLink="/profile">View Orders</a>
        <a mat-stroked-button routerLink="/catalog">Continue Shopping</a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
