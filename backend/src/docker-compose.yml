services:
  catalogdb:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: CatalogDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - catalogdb_data:/var/lib/postgresql/data

  orderdb:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: OrderDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - orderdb_data:/var/lib/postgresql/data

  identitydb:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: IdentityDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - identitydb_data:/var/lib/postgresql/data

  basketcache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - basketcache_data:/data

  messagebroker:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - messagebroker_data:/var/lib/rabbitmq

volumes:
  catalogdb_data:
  orderdb_data:
  identitydb_data:
  basketcache_data:
  messagebroker_data:
